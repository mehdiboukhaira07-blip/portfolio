  <main>
    <section class="section">
      <div class="container contact-grid">
        <article class="card">
          <h2>Coordonnées</h2>
          <ul class="list contact-links">
            <li>
              <a class="contact-item" href="mailto:mehdiboukhaira07@gmail.com">
                <svg class="contact-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v12H3z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 7l9 7 9-7" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
                <span>mehdiboukhaira07@gmail.com</span>
              </a>
            </li>
            <li>
              <a class="contact-item" href="tel:+212625343624">
                <svg class="contact-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 3h3l1.3 4.1-1.8 1.8a15.4 15.4 0 0 0 6.1 6.1l1.8-1.8L21 14.5v3A2.5 2.5 0 0 1 18.5 20C9.9 20 3 13.1 3 4.5A2.5 2.5 0 0 1 5.5 2z" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
                <span>+212 6 25 34 36 24</span>
              </a>
            </li>
            <li>
              <a class="contact-item" href="https://www.behance.net/elmahdiboukhai" target="_blank" rel="noopener noreferrer">
                <svg class="contact-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 9h3a2 2 0 1 1 0 4H8zm0 4h3.3a1.8 1.8 0 1 1 0 3.6H8zM14.5 10.5H19m-4.5 4h4.2a2 2 0 1 1-4.2 0z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
                <span>Behance</span>
              </a>
            </li>
            <li>
              <a class="contact-item" href="https://www.linkedin.com/in/mahdi-boukhaira" target="_blank" rel="noopener noreferrer">
                <svg class="contact-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3.2" y="3.2" width="17.6" height="17.6" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 10v7M8 7.5v.1M12 17v-3.7c0-1.5 1-2.3 2.2-2.3 1.3 0 2 1 2 2.5V17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>

              </a>
            </li>
          </ul>
        </article>

        <article class="card">
          <h2>Formulaire</h2>
          <form action="#" method="post">
            <label class="field-label" for="nom">Nom</label>
            <input id="nom" name="nom" type="text" placeholder="Votre nom complet" autocomplete="name" required>

            <label class="field-label" for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="votre@email.com" autocomplete="email" required>

            <label class="field-label" for="sujet">Sujet</label>
            <input id="sujet" name="sujet" type="text" placeholder="Sujet du message" required>

            <label class="field-label" for="message">Message</label>
            <textarea id="message" name="message" placeholder="Décrivez votre projet en quelques lignes" required></textarea>
            <button class="btn btn-primary" type="submit">Envoyer</button>
          </form>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Boukhaira Portfolio</div>
  </footer>
  <script src="js/theme-toggle.js" defer></script>
